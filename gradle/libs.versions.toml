[versions]
agp = "8.8.2"
kotlin = "2.1.10"
coreKtx = "1.16.0"
appcompat = "1.7.0"
material = "1.12.0"
activity = "1.10.1"
lifecycle = "2.9.0"
firebase-bom = "33.10.0"
health-connect = "1.1.0-alpha12"
acme4j = "3.5.0"
mcp-sdk = "0.4.0"
ktor = "3.1.3"
kotlinx-io = "0.7.0"
junit = "4.13.2"
kotlinx-coroutines = "1.10.2"
ktlint = "12.2.0"
detekt = "1.23.7"
compose-bom = "2025.02.00"
