<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouse Context - Authorize</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 48px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
        .code {
            font-size: 36px;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 4px;
            margin: 24px 0;
            padding: 16px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .instruction {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { margin-top: 16px; color: #666; }
        .error { color: #c00; }
        .success { color: #080; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Rouse Context</div>
        <p class="instruction">Approve this request on your device</p>
        <div class="code">AB3X-9K2F</div>
        <p class="instruction">
            Check your phone for a notification with this code
        </p>
        <div class="spinner" id="spinner"></div>
        <div id="status">Waiting for approval...</div>
    </div>
    <script>
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').className = 'error';
    document.getElementById('status').textContent = 'Request denied';
</script>
</body>
</html>
