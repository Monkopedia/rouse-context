AutoName: Rouse Context

Description: |-
    Rouse Context turns your Android phone into an on-demand
    [MCP](https://modelcontextprotocol.io/) (Model Context Protocol) server.
    AI clients connect to a URL, your phone wakes up, and a direct encrypted
    session is established. The AI asks for what it needs — health data,
    notifications, app usage — your phone responds, then it goes back to sleep.
    Your data never leaves the device except through that live, user-approved
    session.

    This is the FOSS distribution: it uses [UnifiedPush](https://unifiedpush.org/)
    for background wake-ups instead of Firebase Cloud Messaging, and contains no
    Google Play Services or Firebase code. A UnifiedPush distributor (for
    example ntfy) must be installed for the phone to be woken while the app is
    backgrounded.

