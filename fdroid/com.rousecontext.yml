# Source of truth for the version fields is app/build.gradle.kts
# (defaultConfig: versionName / versionCode). Keep this file in sync with it.
#
# WHY THE REPRODUCIBLE-BUILDS PATH (Binaries + AllowedAPKSigningKeys):
# The FOSS release build is effectively reproducible — a clean source build
# matches the published GitHub Release APK byte-for-byte except for the v2/v3
# APK Signing Block (PSS salt differs per signing run), which apksigcopier
# normalizes away. So F-Droid can build from source, confirm reproducibility
# against the published asset, and ship OUR signed APK rather than re-signing
# with the F-Droid key. Result: a user can move between the GitHub FOSS APK and
# the F-Droid build with NO uninstall (same signing identity).
#
# DISTRIBUTION NOTE:
# The bare build IS the FOSS distribution (UnifiedPush wake + ACRA crash
# reporting, zero Firebase / Google Play Services). `-Pgoogle` opts into the
# credentialed Firebase build and is NEVER used here. See app/build.gradle.kts
# (`val googleBuild = project.hasProperty("google")`) and docs/distribution.md.
