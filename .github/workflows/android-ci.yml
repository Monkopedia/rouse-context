name: Android CI

on:
  push:
    branches: [main]
    paths-ignore: ['relay/**', 'docs/**', 'deploy/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Debounce
        run: sleep 60
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo (relay integration-test binary)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: relay
      - name: Build relay binary (for :core:tunnel:integrationTest)
        working-directory: relay
        run: cargo build
      - name: Generate debug keystore
        run: |
          mkdir -p .signing
          keytool -genkeypair -v \
            -keystore .signing/debug.keystore \
            -storepass rousecontext -keypass rousecontext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias debug \
            -dname "CN=Debug,O=Debug,L=Debug,S=Debug,C=US"
      - name: Lint
        run: ./gradlew ktlintCheck
      - name: Check for zombie screen files
        run: bash scripts/check-zombie-screens.sh
      - name: Build
        run: ./gradlew assembleDebug
      - name: Unit tests
        timeout-minutes: 20
        run: |
          ./gradlew \
            :core:tunnel:jvmTest \
            :core:mcp:jvmTest \
            :core:bridge:jvmTest \
            :api:testDebugUnitTest \
            :notifications:testDebugUnitTest \
            :work:testDebugUnitTest \
            :integrations:testDebugUnitTest \
            :app:testDebugUnitTest
      - name: Integration tests (relay)
        if: success() || failure()
        timeout-minutes: 10
        run: ./gradlew :core:tunnel:integrationTest
      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
