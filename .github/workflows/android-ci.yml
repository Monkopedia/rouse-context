name: Android CI

on:
  push:
    branches: [main]
    paths-ignore: ['relay/**', 'docs/**', 'deploy/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
      - name: Generate debug keystore
        run: |
          mkdir -p .signing
          keytool -genkeypair -v \
            -keystore .signing/debug.keystore \
            -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey \
            -dname "CN=Debug,O=Debug,L=Debug,S=Debug,C=US"
      - name: Lint
        run: ./gradlew ktlintCheck
      - name: Build
        run: ./gradlew assembleDebug
      - name: Test
        run: |
          ./gradlew \
            :core:tunnel:jvmTest \
            :core:mcp:jvmTest \
            :core:bridge:jvmTest \
            :api:testDebugUnitTest \
            :notifications:testDebugUnitTest \
            :work:testDebugUnitTest \
            :health:testDebugUnitTest \
            :outreach:testDebugUnitTest \
            :usage:testDebugUnitTest \
            :app:testDebugUnitTest
