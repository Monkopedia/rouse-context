name: Android CI

on:
  push:
    branches: [main]
    paths-ignore: ['relay/**', 'docs/**', 'deploy/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Debounce
        run: sleep 60
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo (relay integration-test binary)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: relay
      - name: Build relay binary (for :core:tunnel:integrationTest)
        working-directory: relay
        # `--features test-mode` compiles in the test-admin surface used by
        # the `:core:tunnel:integrationTest` fixture (issue #249). The feature
        # is compile-time excluded from release builds (deploy workflow runs
        # `cargo build --release` WITHOUT this flag).
        run: cargo build --features test-mode
      - name: Generate debug keystore
        run: |
          mkdir -p .signing
          keytool -genkeypair -v \
            -keystore .signing/debug.keystore \
            -storepass rousecontext -keypass rousecontext \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias debug \
            -dname "CN=Debug,O=Debug,L=Debug,S=Debug,C=US"
      - name: Lint
        run: ./gradlew ktlintCheck
      - name: Check for zombie screen files
        run: bash scripts/check-zombie-screens.sh
      - name: Build
        run: ./gradlew assembleDebug
      - name: Unit tests
        timeout-minutes: 20
        run: |
          ./gradlew \
            :core:tunnel:jvmTest \
            :core:mcp:jvmTest \
            :core:bridge:jvmTest \
            :api:testDebugUnitTest \
            :notifications:testDebugUnitTest \
            :work:testDebugUnitTest \
            :integrations:testDebugUnitTest \
            :app:testDebugUnitTest
      - name: Integration tests (relay)
        if: success() || failure()
        timeout-minutes: 10
        # `:app:integrationTest` boots the real AppModule Koin graph against
        # the same `--test-mode` relay used by `:core:tunnel:integrationTest`
        # (issue #250 scaffold; umbrella #247). Both tasks share the relay
        # binary built above. Run together so Kover's aggregate report
        # (`koverHtmlReport`) picks up coverage from both.
        run: ./gradlew :core:tunnel:integrationTest :app:integrationTest
      - name: Coverage report (Kover)
        # Runs after unit + integration tests. Kover would also trigger tests
        # on its own, but the preceding steps already ran them — Gradle will
        # reuse those results via `UP-TO-DATE`, so this step just aggregates.
        if: success() || failure()
        timeout-minutes: 10
        run: ./gradlew koverHtmlReport koverXmlReport
      - name: Per-module coverage summary
        if: success() || failure()
        run: |
          set -euo pipefail
          {
            echo "## Coverage (line %)"
            echo
            echo "| Module | Covered | Missed | Line % |"
            echo "|---|---:|---:|---:|"
            modules=(api core/tunnel core/mcp core/bridge notifications work integrations app)
            total_cov=0
            total_mis=0
            for m in "${modules[@]}"; do
              f="$m/build/reports/kover/report.xml"
              if [ ! -f "$f" ]; then
                echo "| \`:$m\` | — | — | (no report) |"
                continue
              fi
              # The last LINE counter in a Kover XML is the module total.
              line=$(grep -E '<counter type="LINE"' "$f" | tail -1)
              cov=$(echo "$line" | sed -n 's/.*covered="\([0-9]*\)".*/\1/p')
              mis=$(echo "$line" | sed -n 's/.*missed="\([0-9]*\)".*/\1/p')
              cov=${cov:-0}
              mis=${mis:-0}
              tot=$((cov + mis))
              if [ "$tot" -eq 0 ]; then
                pct="—"
              else
                pct=$(awk "BEGIN { printf \"%.1f%%\", ($cov * 100) / $tot }")
              fi
              echo "| \`:${m//\//:}\` | $cov | $mis | $pct |"
              total_cov=$((total_cov + cov))
              total_mis=$((total_mis + mis))
            done
            grand_tot=$((total_cov + total_mis))
            if [ "$grand_tot" -gt 0 ]; then
              grand_pct=$(awk "BEGIN { printf \"%.1f%%\", ($total_cov * 100) / $grand_tot }")
            else
              grand_pct="—"
            fi
            echo "| **Total** | **$total_cov** | **$total_mis** | **$grand_pct** |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage HTML
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: build/reports/kover/html/
      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
