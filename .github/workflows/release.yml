name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0) — only used for the GitHub release title when triggered manually'
        required: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Decode release keystore
        run: |
          mkdir -p .signing
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > .signing/release.keystore

      # Distribution is a build flag, not a product flavor (#467): the bare
      # build is FOSS (UnifiedPush, no Firebase), `-Pgoogle` swaps in the
      # Firebase-backed sources. Both variants write to the SAME unprefixed
      # `release/` output paths, so we build FOSS first, copy its signed APK
      # out to `dist/`, then `clean` and build Google — the clean guarantees
      # the source-set selection for the second variant starts from scratch
      # rather than reusing the first variant's merged manifest/resources.

      - name: Build FOSS release APK (default, no flag)
        env:
          ROUSE_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ROUSE_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease

      - name: Extract version from APK
        id: version
        run: |
          # Pull versionName from the build output metadata (same for both variants).
          VERSION=$(grep -oP '"versionName"\s*:\s*"\K[^"]+' app/build/outputs/apk/release/output-metadata.json || echo "unknown")
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.version || format('v{0}', env.VERSION) }}}" >> "$GITHUB_OUTPUT"

      - name: Stage FOSS APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/rouse-context-${{ steps.version.outputs.name }}-foss.apk"

      - name: Build Google release APK + AAB (-Pgoogle)
        env:
          ROUSE_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ROUSE_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        # `clean` first so the Google source set isn't contaminated by the FOSS
        # build's merged outputs (both share the unprefixed `release/` paths).
        run: |
          ./gradlew clean :app:assembleRelease :app:bundleRelease -Pgoogle

      - name: Stage Google APK + AAB
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/rouse-context-${{ steps.version.outputs.name }}-google.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
            "dist/rouse-context-${{ steps.version.outputs.name }}-google.aab"

      - name: Upload FOSS APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-foss
          path: dist/rouse-context-${{ steps.version.outputs.name }}-foss.apk

      - name: Upload Google APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-google
          path: dist/rouse-context-${{ steps.version.outputs.name }}-google.apk

      - name: Upload Google AAB artifact (for Play Console)
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-google
          path: dist/rouse-context-${{ steps.version.outputs.name }}-google.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Rouse Context ${{ steps.version.outputs.name }}
          generate_release_notes: true
          body: |
            ## Downloads

            Two builds ship with each release — both signed with the same release key:

            | Asset | Distribution | Use when |
            | --- | --- | --- |
            | `rouse-context-${{ steps.version.outputs.name }}-foss.apk` | **FOSS** (UnifiedPush, no Firebase/Google Play services) | Sideloading on de-Googled devices / F-Droid-style installs. |
            | `rouse-context-${{ steps.version.outputs.name }}-google.apk` | **Google** (Firebase Cloud Messaging) | Sideloading on devices with Google Play services. |
            | `rouse-context-${{ steps.version.outputs.name }}-google.aab` | **Google** App Bundle | Play Console upload only — not directly installable. |

            ---
          files: |
            dist/rouse-context-${{ steps.version.outputs.name }}-foss.apk
            dist/rouse-context-${{ steps.version.outputs.name }}-google.apk
            dist/rouse-context-${{ steps.version.outputs.name }}-google.aab
