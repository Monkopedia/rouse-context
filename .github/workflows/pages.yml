name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/user/**'
      - 'docs/notifications/**'
      - 'notifications/screenshots/**'
      - 'docs/internal/**'
      - 'docs/screenshots/**'
      - 'docs/auth-pages/**'
      - 'app/screenshots/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: docs/user
          destination: ./_site
      # Jekyll's container runs as a non-root user and leaves `_site` owned by
      # that uid, so subsequent steps (running as runner) can't write into it.
      # Chmod the tree so the catalog copy steps below can land their files.
      - name: Make _site writable for catalog copy steps
        run: sudo chmod -R a+w _site
      # Unified internal design-review landing (#348) plus any already-staged
      # sub-catalogs that live under docs/internal/ (currently includes
      # audit-row-variants/ whose HTML references ./screenshots/*.png). Copy
      # this first so the later per-catalog copies overlay into the expected
      # subdirectories without clobbering the landing's index.html.
      - name: Include internal landing and checked-in sub-catalogs
        run: |
          mkdir -p _site/internal
          cp -r docs/internal/. _site/internal/
      - name: Include notification catalog
        run: |
          mkdir -p _site/internal/notifications _site/notifications/screenshots
          cp -r docs/notifications/. _site/internal/notifications/
          cp -r notifications/screenshots/. _site/notifications/screenshots/
      # App UI screenshot gallery (#348). Hand-maintained wrapper HTML in
      # docs/screenshots/; PNGs live in app/screenshots/. The HTML references
      # images via ../../app/screenshots/*.png so the HTML lands at
      # /internal/app/ and the PNGs land at /app/screenshots/.
      - name: Include app UI screenshot catalog
        run: |
          if [ -d docs/screenshots ]; then
            mkdir -p _site/internal/app
            cp -r docs/screenshots/. _site/internal/app/
          fi
          if [ -d app/screenshots ]; then
            mkdir -p _site/app/screenshots
            cp -r app/screenshots/. _site/app/screenshots/
          fi
      # OAuth auth-pages catalog (#348). Self-contained: the index embeds
      # sibling HTML files via relative iframes, so a single directory copy
      # is sufficient.
      - name: Include OAuth auth-pages catalog
        run: |
          if [ -d docs/auth-pages ]; then
            mkdir -p _site/internal/auth
            cp -r docs/auth-pages/. _site/internal/auth/
          fi
      # Audit row variants catalog (#343). Auto-generated by
      # AuditRowVariantsScreenshotTest — HTML and PNGs are checked into the
      # repo so Pages publishes them without rerunning tests in CI.
      # (The HTML itself is already copied above as part of docs/internal/;
      # we only need to drop the PNGs into the sibling screenshots/ subdir.)
      - name: Include audit row variants screenshots
        run: |
          if [ -d app/screenshots/audit-row-variants ]; then
            mkdir -p _site/internal/audit-row-variants/screenshots
            cp -r app/screenshots/audit-row-variants/. _site/internal/audit-row-variants/screenshots/
          fi
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
