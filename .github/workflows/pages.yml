name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/user/**'
      - 'docs/notifications/**'
      - 'notifications/screenshots/**'
      - 'docs/internal/**'
      - 'app/screenshots/audit-row-variants/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: docs/user
          destination: ./_site
      - name: Include notification catalog
        run: |
          mkdir -p _site/internal/notifications _site/notifications/screenshots
          cp -r docs/notifications/. _site/internal/notifications/
          cp -r notifications/screenshots/. _site/notifications/screenshots/
      # Audit row variants catalog (#343). Auto-generated by
      # AuditRowVariantsScreenshotTest — HTML and PNGs are checked into the
      # repo so Pages publishes them without rerunning tests in CI.
      - name: Include audit row variants catalog
        run: |
          if [ -d docs/internal/audit-row-variants ]; then
            mkdir -p _site/internal/audit-row-variants
            cp -r docs/internal/audit-row-variants/. _site/internal/audit-row-variants/
          fi
          if [ -d app/screenshots/audit-row-variants ]; then
            mkdir -p _site/internal/audit-row-variants/screenshots
            cp -r app/screenshots/audit-row-variants/. _site/internal/audit-row-variants/screenshots/
          fi
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
