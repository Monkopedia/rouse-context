name: Deploy Relay

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            relay/target
          key: relay-${{ hashFiles('relay/Cargo.lock') }}

      - name: Build relay
        working-directory: relay
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Run tests
        working-directory: relay
        run: cargo test

      - name: Deploy to VPS
        if: github.ref == 'refs/heads/main'
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/deploy_key \
            relay/target/x86_64-unknown-linux-musl/release/rouse-relay \
            "$VPS_USER@$VPS_HOST":/opt/rouse-relay/rouse-relay.new

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" bash -s <<'EOF'
          sudo mv /opt/rouse-relay/rouse-relay.new /opt/rouse-relay/rouse-relay
          sudo chmod +x /opt/rouse-relay/rouse-relay
          sudo systemctl restart rouse-relay
          sleep 2
          sudo systemctl is-active rouse-relay
          EOF
