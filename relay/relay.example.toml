[server]
bind_addr = "0.0.0.0:443"
relay_hostname = "relay.rousecontext.com"
# Base domain under which all devices are provisioned. If omitted, derived from
# `relay_hostname` by stripping a leading "relay." prefix. Set explicitly when
# your relay hostname doesn't follow that convention.
# base_domain = "rousecontext.com"

[tls]
cert_path = "/etc/relay/cert.pem"
key_path = "/etc/relay/key.pem"

[firebase]
project_id = "rouse-context"
service_account_path = "/etc/relay/firebase-sa.json"

[cloudflare]
zone_id = "your-cloudflare-zone-id"
api_token_env = "CF_API_TOKEN"

[acme]
# ACME provider directory URL. Default (when omitted) is Google Trust Services
# production: https://dv.acme-v02.api.pki.goog/directory — 100 new orders/hour
# and already in every browser/OS root store. GTS requires
# externalAccountBinding; see `external_account_binding_*_env` below.
# directory_url = "https://dv.acme-v02.api.pki.goog/directory"          # GTS production (default)
# directory_url = "https://acme-v02.api.letsencrypt.org/directory"      # LE production (no EAB)
# directory_url = "https://acme-staging-v02.api.letsencrypt.org/directory"  # LE staging
dns_propagation_timeout_secs = 60  # max wait for TXT record to propagate
dns_poll_interval_secs = 5         # how often to check DNS during propagation
# account_key_path = "/etc/rouse-relay/gts_acme_account_key.pem"
# Refuse to start if account_key_path is missing instead of silently creating a
# new ACME account. Enable in production; leave false for fresh installs.
# See README.md "ACME account key" for why this matters.
require_existing_account = false
#
# External Account Binding (RFC 8555 §7.3.4). GTS requires this on the first
# newAccount registration; subsequent cert orders against the same account
# key work without it. Let's Encrypt does not require EAB — leave these unset
# (or point them at env vars that aren't set) to disable.
#
# Each field names an environment variable; the env var holds the value.
# For GTS, create EAB credentials with:
#   gcloud publicca external-account-keys create
# and populate /etc/rouse-relay/env with GTS_EAB_KID and GTS_EAB_HMAC.
external_account_binding_kid_env = "GTS_EAB_KID"
external_account_binding_hmac_env = "GTS_EAB_HMAC"
#
# Startup CAA verification (#322). At boot the relay queries CAA records for
# `base_domain` and verifies the configured ACME provider is authorised.
# A mismatch means renewal will fail at +60-90 days silently. When false
# (default), a mismatch is logged ERROR and the relay keeps running. Set
# true for strict production deploys — the relay exits with code 1 instead.
# fail_on_caa_mismatch = false

[limits]
max_streams_per_device = 32
wake_rate_limit = 6  # per minute per subdomain
# Per-(source IP, subdomain) sliding-window cap on passthrough connections.
# Defaults: 200 connections per 60s window. All AI-client traffic for one user
# typically arrives from a single backend IP (e.g. Anthropic's MCP gateway),
# so this is effectively per-user, not per-attacker. Raise if legitimate
# integration bursts are being rejected; lower only if you see scanner noise
# getting through.
# conn_rate_limit_max = 200
# conn_rate_limit_window_secs = 60
#
# If true, `/ws` will auto-create a minimal Firestore device record when a
# mTLS-authenticated device connects with no existing record. This exists
# only to keep test fixtures convenient — MUST remain false in production.
# A compromised or revoked client cert could otherwise silently resurrect a
# subdomain with empty firebase_uid and no valid_secrets (#209).
# allow_ws_auto_create_device = false
